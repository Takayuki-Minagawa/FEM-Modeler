<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <!-- FEM mesh triangle grid -->
  <g stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <!-- Outer triangle -->
    <polygon points="32,8 8,52 56,52"/>
    <!-- Inner horizontal lines -->
    <line x1="20" y1="30" x2="44" y2="30"/>
    <line x1="14" y1="41" x2="50" y2="41"/>
    <!-- Inner diagonal lines (left) -->
    <line x1="32" y1="8" x2="14" y2="41"/>
    <line x1="32" y1="8" x2="50" y2="41"/>
    <line x1="20" y1="30" x2="8" y2="52"/>
    <line x1="44" y1="30" x2="56" y2="52"/>
    <!-- Inner vertical-ish lines -->
    <line x1="20" y1="30" x2="26" y2="41"/>
    <line x1="44" y1="30" x2="38" y2="41"/>
    <line x1="32" y1="30" x2="32" y2="41"/>
    <line x1="26" y1="41" x2="20" y2="52"/>
    <line x1="32" y1="41" x2="32" y2="52"/>
    <line x1="38" y1="41" x2="44" y2="52"/>
  </g>
  <!-- Nodes (dots) -->
  <g fill="#5da0e9">
    <circle cx="32" cy="8" r="2.5"/>
    <circle cx="20" cy="30" r="2.5"/>
    <circle cx="32" cy="30" r="2.5"/>
    <circle cx="44" cy="30" r="2.5"/>
    <circle cx="8" cy="52" r="2.5"/>
    <circle cx="14" cy="41" r="2"/>
    <circle cx="26" cy="41" r="2"/>
    <circle cx="32" cy="41" r="2"/>
    <circle cx="38" cy="41" r="2"/>
    <circle cx="50" cy="41" r="2"/>
    <circle cx="20" cy="52" r="2"/>
    <circle cx="32" cy="52" r="2"/>
    <circle cx="44" cy="52" r="2"/>
    <circle cx="56" cy="52" r="2.5"/>
  </g>
</svg>
